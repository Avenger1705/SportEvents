<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié – Sport Events</title>
  <meta name="description" content="Réinitialisez votre mot de passe Sport Events.">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/api.js"></script>
  <style>
    .otp-box::-webkit-outer-spin-button,
    .otp-box::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .otp-box {
      -moz-appearance: textfield;
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s ease;
    }

    .otp-box:focus {
      border-color: var(--blue);
      outline: none;
    }

    .otp-box.filled {
      border-color: var(--blue);
    }

    .otp-row {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }
  </style>
</head>

<body>
  <div class="bg-scene"></div>

  <div class="page-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="icon">🔑</span>
        <h1>Mot de passe oublié</h1>
        <p>Réinitialisez votre accès</p>
      </div>

      <div id="alertZone"></div>

      <!-- Step 1: Request OTP -->
      <form id="step1Form" class="auth-form" novalidate>
        <p style="text-align:center;color:var(--text-2);font-size:14px;margin-bottom:16px;">
          Entrez votre email ou pseudo pour recevoir un code.
        </p>
        <div class="form-group">
          <label for="identifier">Adresse email ou nom d'utilisateur</label>
          <input id="identifier" type="text" placeholder="vous@exemple.com ou pseudo" required>
        </div>
        <button id="btnSend" type="submit" class="btn btn-primary mt-16">
          Envoyer le code
        </button>
      </form>

      <form id="step2Form" class="auth-form" style="display: none;" novalidate>
        <p style="text-align:center;color:var(--text-2);font-size:14px;margin-bottom:16px;">
          Un code a été envoyé à <strong id="sentEmail" style="color:var(--text)"></strong>.
        </p>

        <div class="form-group" style="margin-bottom:24px;">
          <label style="display:block;margin-bottom:8px;font-size:14px;color:var(--text-2);">Code de
            vérification</label>
          <div class="otp-row">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="0" inputmode="numeric"
              autocomplete="one-time-code">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="1" inputmode="numeric">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="2" inputmode="numeric">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="3" inputmode="numeric">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="4" inputmode="numeric">
            <input class="otp-box reset-box" type="number" maxlength="1" data-idx="5" inputmode="numeric">
          </div>
        </div>

        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <input id="newPassword" type="password" placeholder="••••••••" required minlength="6">
        </div>

        <button id="btnReset" type="submit" class="btn btn-primary mt-16">
          Réinitialiser le mot de passe
        </button>
      </form>

      <div class="link-row mt-16">
        <a href="login.html">← Retour à la connexion</a>
      </div>
    </div>
  </div>

  <script>
    const step1Form = document.getElementById("step1Form");
    const step2Form = document.getElementById("step2Form");
    const identifierEl = document.getElementById("identifier");
    const boxes = [...document.querySelectorAll(".reset-box")];
    const newPwEl = document.getElementById("newPassword");
    const alertZone = document.getElementById("alertZone");

    let userIdentifier = "";

    function getOtpValue() { return boxes.map(b => b.value).join(""); }

    boxes.forEach((box, i) => {
      box.addEventListener("input", (e) => {
        box.value = box.value.replace(/\D/g, "").slice(-1);
        if (box.value && i < 5) boxes[i + 1].focus();
        box.classList.toggle("filled", /^\d$/.test(box.value));
      });
      box.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !box.value && i > 0) {
          boxes[i - 1].value = "";
          boxes[i - 1].focus();
          boxes[i - 1].classList.remove("filled");
        }
        if (e.key === "ArrowLeft" && i > 0) { boxes[i - 1].focus(); e.preventDefault(); }
        if (e.key === "ArrowRight" && i < 5) { boxes[i + 1].focus(); e.preventDefault(); }
      });
      box.addEventListener("paste", (e) => {
        e.preventDefault();
        const digits = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
        digits.split("").forEach((d, j) => {
          if (boxes[j]) { boxes[j].value = d; boxes[j].classList.add("filled"); }
        });
        const next = Math.min(digits.length, 5);
        boxes[next].focus();
      });
    });

    function showAlert(msg, type = "error") {
      alertZone.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    step1Form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertZone.innerHTML = "";
      userIdentifier = identifierEl.value.trim();

      if (!userIdentifier) return;

      const btn = document.getElementById("btnSend");
      setButtonLoading(btn, true, "Envoyer le code");

      try {
        const data = await API.forgotPassword(userIdentifier);
        showAlert(data.message, "success");
        document.getElementById("sentEmail").textContent = data.email_masked || userIdentifier;
        step1Form.style.display = "none";
        step2Form.style.display = "block";
        boxes[0].focus();
      } catch (err) {
        showAlert(err.message);
      } finally {
        setButtonLoading(btn, false, "Envoyer le code");
      }
    });

    step2Form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertZone.innerHTML = "";

      const otp = getOtpValue();
      const newPassword = newPwEl.value;

      if (otp.length < 6) {
        return showAlert("Code OTP incomplet");
      }
      if (newPassword.length < 6) {
        return showAlert("Votre mot de passe doit comporter au moins 6 caractères");
      }

      const btn = document.getElementById("btnReset");
      setButtonLoading(btn, true, "Réinitialisation...");

      try {
        const data = await API.resetPassword(userIdentifier, otp, newPassword);
        showAlert("Mot de passe mis à jour ! Redirection...", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } catch (err) {
        showAlert(err.message);
        setButtonLoading(btn, false, "Réinitialiser le mot de passe");
      }
    });
  </script>
</body>

</html>
